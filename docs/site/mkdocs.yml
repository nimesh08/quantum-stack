# mkdocs.yml — Heisenberg Quantum Stack documentation site
#
# Pinned versions (re-verified upstream 2026-06-16):
#   - mkdocs                <2.0
#   - mkdocs-material       9.7.6 (in maintenance through Nov 2026)
#   - mkdocstrings[python]  1.0.4
#   - mkdocstrings-python   2.0.4
#   - mkdocs-redirects      >=1.2,<2.0
#   - pymdown-extensions    >=10.7
#   - typedoc-plugin-markdown 4.12.0 (run separately, output rendered as MD)
#   - @redocly/cli          2.32.2  (run separately, output is HTML embed)
#   - doxygen               1.9.x (run separately, output is HTML embed)
#
# Built and deployed by .github/workflows/docs.yml on every push to main.
#
# Author: Nimesh Cheedella.

site_name: Heisenberg Quantum Stack
site_description: >
  Photon · Phonon · Spinor — a four-layer quantum compiler with
  cost-controlled job execution, three SDKs (Python · C++ · TypeScript)
  and a single-command launcher.
site_author: Nimesh Cheedella
site_url: https://nimesh08.github.io/quantum-stack/
repo_url: https://github.com/nimesh08/quantum-stack
repo_name: nimesh08/quantum-stack
edit_uri: edit/main/docs/site/
copyright: >
  Copyright &copy; 2026 Nimesh Cheedella —
  <a href="https://github.com/nimesh08/quantum-stack/blob/main/LICENSE">Apache-2.0</a>

docs_dir: content
site_dir: build/site

theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nimesh08/quantum-stack
  generator: false

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - ../../platform/jobsvc/src
            - ../../platform/calibration/src
            - ../../platform/launcher/src
            - ../../spinor/submit/python
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            merge_init_into_class: true
            members_order: source
            heading_level: 2
            docstring_section_style: table
            filters:
              - "!^_"
              - "!^Base$"
            show_bases: true
            inherited_members: false
  - redirects:
      redirect_maps:
        # Pages that moved into the new internals/ section.
        futureplan.md: internals/futureplan.md
        chips_unsupported.md: internals/chips_unsupported.md
        glossary.md: internals/glossary.md
        # Old top-level pages that moved.
        guide/index.md: operations/index.md
        guide/operations.md: operations/index.md
        guide/platform_guide.md: operations/index.md
        guide/decisions.md: internals/decisions.md
        guide/progress.md: internals/progress.md
        # Old packages tree -> new SDK tree.
        packages/index.md: sdks/index.md
        packages/jobsvc/install.md: operations/install.md
        packages/jobsvc/cookbook.md: sdks/python/cookbook.md
        packages/jobsvc/sdk_examples.md: sdks/python/cookbook.md
        packages/spinor_submit/install.md: sdks/python/install.md
        packages/spinor_submit/reference.md: reference/python/spinor_submit.md
        packages/spinor_submit/credentials.md: operations/credentials.md
        packages/photon_python/install.md: sdks/python/install.md
        packages/photon_python/reference.md: reference/python/photon.md
        packages/playground/install.md: sdks/typescript/install.md
        # Old install tree.
        install/cli.md: languages/spinor/install.md
        install/from_source.md: operations/install.md
        install/spinorc_cli.md: languages/spinor/install.md
        install/photonc_cxx.md: languages/photon/install.md
        install/photon_python.md: sdks/python/install.md
        install/spinor_submit.md: sdks/python/install.md
        install/jobsvc.md: operations/install.md
        install/calibration.md: operations/install.md
        install/playground.md: sdks/typescript/install.md
        install/server_systemd.md: operations/native_systemd.md
        install/docker_compose.md: operations/install.md
        install/troubleshooting.md: operations/troubleshooting.md
        # Tutorial -> language tutorials.
        tutorial/spinor_walkthrough.md: languages/spinor/tutorial.md
        tutorial/phonon_walkthrough.md: languages/phonon/tutorial.md
        tutorial/photon_walkthrough.md: languages/photon/tutorial.md
        tutorial/index.md: languages/index.md
        tutorial/bell.md: languages/spinor/tutorial.md
        tutorial/ghz.md: languages/spinor/cookbook/ghz.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - "."
        - "content/_includes"
        - "../.."
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Languages:
      - languages/index.md
      - Spinor:
          - languages/spinor/index.md
          - "Install": languages/spinor/install.md
          - "Tutorial": languages/spinor/tutorial.md
          - "Lexical": languages/spinor/lexical.md
          - "Grammar": languages/spinor/grammar.md
          - "Types": languages/spinor/types.md
          - "Cookbook": languages/spinor/cookbook/index.md
      - Phonon:
          - languages/phonon/index.md
          - "Install": languages/phonon/install.md
          - "Tutorial": languages/phonon/tutorial.md
          - "Lexical": languages/phonon/lexical.md
          - "Grammar": languages/phonon/grammar.md
          - "Types": languages/phonon/types.md
          - "Linear types": languages/phonon/linear_types.md
          - "Cookbook": languages/phonon/cookbook/index.md
      - Photon:
          - languages/photon/index.md
          - "Install": languages/photon/install.md
          - "Tutorial": languages/photon/tutorial.md
          - "Lexical": languages/photon/lexical.md
          - "Grammar": languages/photon/grammar.md
          - "Types": languages/photon/types.md
          - "Cookbook": languages/photon/cookbook/index.md
  - SDKs:
      - sdks/index.md
      - "Python":
          - sdks/python/index.md
          - "Install": sdks/python/install.md
          - "Quickstart": sdks/python/quickstart.md
          - "Tutorial": sdks/python/tutorial.md
          - "Cookbook": sdks/python/cookbook.md
      - "C++":
          - sdks/cpp/index.md
          - "Install": sdks/cpp/install.md
          - "Quickstart": sdks/cpp/quickstart.md
          - "Tutorial": sdks/cpp/tutorial.md
          - "Cookbook": sdks/cpp/cookbook.md
      - "TypeScript":
          - sdks/typescript/index.md
          - "Install": sdks/typescript/install.md
          - "Quickstart": sdks/typescript/quickstart.md
          - "Tutorial": sdks/typescript/tutorial.md
          - "Cookbook": sdks/typescript/cookbook.md
      - "REST":
          - sdks/rest/index.md
          - "Authentication": sdks/rest/authentication.md
          - "Errors": sdks/rest/errors.md
          - "Pagination": sdks/rest/pagination.md
  - Operations:
      - operations/index.md
      - "Install": operations/install.md
      - "Native systemd": operations/native_systemd.md
      - "Postgres": operations/postgres.md
      - "Calibration refresh": operations/calibration.md
      - "Provider credentials": operations/credentials.md
      - "Observability": operations/observability.md
      - "Troubleshooting": operations/troubleshooting.md
  - Internals:
      - internals/index.md
      - "Architecture": internals/architecture.md
      - "Seven critical rules": internals/seven_rules.md
      - "Decisions log": internals/decisions.md
      - "Build journal": internals/progress.md
      - "Future plan": internals/futureplan.md
      - "Unsupported chips": internals/chips_unsupported.md
      - "Glossary": internals/glossary.md
  - Reference:
      - reference/index.md
      - "Python": reference/python/index.md
      - "C++": reference/cpp/index.md
      - "TypeScript": reference/typescript/index.md
      - "REST": reference/rest/index.html
  - FAQ: faq.md
  - Changelog: changelog.md
  - Authors: authors.md

watch:
  - ../../platform/jobsvc/src
  - ../../platform/calibration/src
  - ../../platform/launcher/src
  - ../../spinor/submit/python/spinor_submit
