# mkdocs.yml — Heisenberg Quantum Stack documentation site
#
# Pinned versions (re-verified upstream 2026-06-16):
#   - mkdocs                <2.0
#   - mkdocs-material       9.7.6 (in maintenance mode through Nov 2026; D7)
#   - mkdocstrings[python]  1.0.4
#   - mkdocstrings-python   2.0.4
#   - pymdown-extensions    >=10.7
#   - typedoc-plugin-markdown 4.12.0 (run separately, output rendered as MD)
#   - @redocly/cli          2.32.2  (run separately, output is HTML embed)
#
# Built and deployed by .github/workflows/docs.yml on every push to main.

site_name: Heisenberg Quantum Stack
site_description: >
  Photon · Phonon · Spinor — a four-layer quantum compiler with
  cost-controlled job execution and a browser playground.
site_author: Heisenberg Research
site_url: https://nimesh08.github.io/quantum-stack/
repo_url: https://github.com/nimesh08/quantum-stack
repo_name: nimesh08/quantum-stack
edit_uri: edit/main/docs/site/

docs_dir: content
site_dir: build/site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nimesh08/quantum-stack
  generator: false

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - ../../platform/jobsvc/src
            - ../../platform/calibration/src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            merge_init_into_class: true
            members_order: source
            heading_level: 2
            docstring_section_style: table
            filters:
              - "!^_"
              - "!^Base$"
            show_bases: true
            inherited_members: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - "."
        - "content/_includes"
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

