# nginx config for the Heisenberg quantum-stack platform.
#
# Serves the playground SPA at /, reverse-proxies the API to jobsvc
# on 127.0.0.1:8000.
#
# Install:
#   sudo install -m 644 quantum-stack.conf /etc/nginx/sites-available/quantum-stack
#   sudo ln -sf /etc/nginx/sites-available/quantum-stack /etc/nginx/sites-enabled/quantum-stack
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo sed -i 's/yourserver.example.com/your.real.host/g' \
#               /etc/nginx/sites-available/quantum-stack
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your.real.host
#
# After certbot rewrites the file, the :443 server block has
# ssl_certificate / ssl_certificate_key set automatically; you do not
# need to edit those lines.

server {
    listen 80;
    listen [::]:80;
    server_name yourserver.example.com;

    # certbot replaces this block with a redirect to :443.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourserver.example.com;

    # certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/your.real.host/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your.real.host/privkey.pem;

    # Static SPA built by `npm run build` in platform/playground/.
    root /opt/quantum-stack/platform/playground/dist;
    index index.html;

    # Reasonable defaults
    client_max_body_size 1m;             # source up to ~200KB enforced by jobsvc
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }
    location /healthz { proxy_pass http://127.0.0.1:8000/healthz; }
    location /readyz  { proxy_pass http://127.0.0.1:8000/readyz; }
    location /metrics {
        # Restrict metrics to localhost or your monitoring CIDR.
        allow 127.0.0.1/32;
        # allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    # SPA fallback — every unknown path serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache the immutable assets aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
