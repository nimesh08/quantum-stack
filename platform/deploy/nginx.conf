server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://jobsvc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }
    location /healthz { proxy_pass http://jobsvc:8000/healthz; }
    location /readyz  { proxy_pass http://jobsvc:8000/readyz; }
    location /metrics { proxy_pass http://jobsvc:8000/metrics; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
