# spinor/registry/chips/ibm_osprey.yaml

id: ibm_osprey
provider: ibm
qubits: 433
native_gates: [ecr, rz, sx, x]

coupling_map:
  topology: heavy_hex_433
  size: 433

supports:
  mid_circuit_measure: true
  feedforward: limited
  reset: true

calibration:
  source: ibm_runtime_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/ibm_osprey.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: rz
    pi_2_gate: sx
  two_qubit:
    recipe: kak
    entangler: ecr
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.00016

notes: |
  IBM Osprey: 433-qubit superconducting research-class. Not on Premium pay-as-you-go; access via internal/research channels.
  Eagle r3 architecture; ECR is the native two-qubit
  gate, rz is virtual. Heavy-hex topology.
  source: https://www.ibm.com/quantum/blog/quantum-roadmap-2033
  verified-upstream: 2026-06-16
