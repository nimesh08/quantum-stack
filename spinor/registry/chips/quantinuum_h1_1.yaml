# spinor/registry/chips/quantinuum_h1_1.yaml

id: quantinuum_h1_1
provider: azure
qubits: 20
native_gates: [u1q, rzz]

coupling_map:
  topology: all_to_all
  size: 20

supports:
  mid_circuit_measure: true
  feedforward: full
  reset: true

calibration:
  source: azure_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/quantinuum_h1_1.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: u1q
    pi_2_gate: ""
  two_qubit:
    recipe: kak
    entangler: rzz
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.05

notes: |
  Quantinuum H1-1: 20-qubit trapped-ion QCCD.
  Trapped-ion QCCD; full feedforward classical
  control. Adaptive-profile QIR target.
  source: https://learn.microsoft.com/azure/quantum/provider-quantinuum
  verified-upstream: 2026-06-16
