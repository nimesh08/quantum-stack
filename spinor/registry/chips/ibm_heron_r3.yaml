# spinor/registry/chips/ibm_heron_r3.yaml

id: ibm_heron_r3
provider: ibm
qubits: 156
native_gates: [cz, rz, sx, x]

coupling_map:
  topology: heavy_hex_156
  size: 156

supports:
  mid_circuit_measure: true
  feedforward: limited
  reset: true

calibration:
  source: ibm_runtime_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/ibm_heron_r3.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: rz
    pi_2_gate: sx
  two_qubit:
    recipe: kak
    entangler: cz
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.00033

notes: |
  IBM Heron r3: 156-qubit superconducting (Marrakesh, Fez).
  Heron-class tunable-coupler architecture; CZ is the
  native two-qubit gate. rz is virtual.
  source: https://quantum.cloud.ibm.com/computers
  verified-upstream: 2026-06-16
