# spinor/registry/chips/ibm_aachen.yaml

id: ibm_aachen
provider: ibm
qubits: 156
native_gates: [cz, rz, sx, x]

coupling_map:
  topology: heavy_hex_156
  size: 156

supports:
  mid_circuit_measure: true
  feedforward: limited
  reset: true

calibration:
  source: ibm_runtime_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/ibm_aachen.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: rz
    pi_2_gate: sx
  two_qubit:
    recipe: kak
    entangler: cz
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.00033

notes: |
  IBM Quantum Heron r3 physical device. 156-qubit heavy-hex coupling
  map, tunable couplers, CZ entangler. Region: eu-de. First EU Heron
  r3, online since 2026-03-09. Plan availability: Pay-As-You-Go,
  Flex, Premium.
  source: https://quantum.cloud.ibm.com/computers
  verified-upstream: 2026-06-27
