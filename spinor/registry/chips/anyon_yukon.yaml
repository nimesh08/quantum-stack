# spinor/registry/chips/anyon_yukon.yaml

id: anyon_yukon
provider: anyon
qubits: 8
native_gates: [cz, rx, rz]

coupling_map:
  topology: linear_n
  size: 8

supports:
  mid_circuit_measure: false
  feedforward: none
  reset: true

calibration:
  source: fixture
  refresh: fixture
  store: ~/.cache/spinor/calibration/anyon_yukon.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: rz
    pi_2_gate: ""
  two_qubit:
    recipe: kak
    entangler: cz
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.0

notes: |
  Anyon Technologies Yukon: 8-qubit superconducting on
  Anyon's first-gen QPU (Toronto). Cassette-only until
  the production REST endpoint is published; see
  chips_unsupported.md.
  source: https://anyontech.com/yukon/
  verified-upstream: 2026-06-16
