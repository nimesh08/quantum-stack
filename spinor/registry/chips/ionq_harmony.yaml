# spinor/registry/chips/ionq_harmony.yaml

id: ionq_harmony
provider: aws
qubits: 11
native_gates: [gpi, gpi2, ms]

coupling_map:
  topology: all_to_all
  size: 11

supports:
  mid_circuit_measure: false
  feedforward: none
  reset: false

calibration:
  source: braket_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/ionq_harmony.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: gpi
    pi_2_gate: gpi2
  two_qubit:
    recipe: kak
    entangler: ms
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.01
  per_minute_usd: 0.3

notes: |
  IonQ Harmony: 11-qubit trapped-ion. Decommissioning is underway on AWS Braket; mirror entry exists in chips_unsupported.md so the cassette path keeps working.
  Trapped-ion all-to-all. Moelmer-Soerensen is the
  native two-qubit interaction.
  source: https://aws.amazon.com/braket/quantum-computers/ionq/
  verified-upstream: 2026-06-16
