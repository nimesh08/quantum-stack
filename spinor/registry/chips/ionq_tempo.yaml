# spinor/registry/chips/ionq_tempo.yaml

id: ionq_tempo
provider: aws
qubits: 64
native_gates: [gpi, gpi2, ms]

coupling_map:
  topology: all_to_all
  size: 64

supports:
  mid_circuit_measure: false
  feedforward: none
  reset: false

calibration:
  source: braket_api
  refresh: nightly
  store: ~/.cache/spinor/calibration/ionq_tempo.json

decomposition:
  one_qubit:
    recipe: euler_zyz
    rotation_gate: gpi
    pi_2_gate: gpi2
  two_qubit:
    recipe: kak
    entangler: ms
    entangler_count_max: 3

pricing:
  per_shot_usd: 0.03
  per_minute_usd: 0.3

notes: |
  IonQ Tempo: 64-qubit trapped-ion (next-gen Forte family).
  Trapped-ion all-to-all. Moelmer-Soerensen is the
  native two-qubit interaction.
  source: https://aws.amazon.com/braket/quantum-computers/ionq/
  verified-upstream: 2026-06-16
