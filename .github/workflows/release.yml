# quantum-stack release pipeline.
#
# Tag-triggered (v*.*.*). Builds and publishes:
#
# 1. heisenberg-photon          (PyPI wheel; cibuildwheel matrix)
#      - photon._engine.so + photon facade
#      - photon/registry/  (chip YAMLs)
#      - photon/bin/spinorc + photon/bin/photonc on $PATH
# 2. heisenberg-spinor-submit   (pure-Python sdist + wheel)
# 3. spinorc / phononc / photonc / photonc-cxx
#      Signed binaries on GitHub Releases for power users.
#      cosign keyless signature + syft CycloneDX SBOM.
#
# OIDC trusted publishing (no long-lived tokens) for PyPI; configured
# at the project level on PyPI / TestPyPI.
#
# Author: Nimesh Cheedella.

name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the production publish steps (TestPyPI + GitHub artefacts only)"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_photon_wheels:
    name: build heisenberg-photon (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
            cibw_archs: "x86_64"
          - os: ubuntu-24.04-arm
            target: linux-arm64
            cibw_archs: "aarch64"
          - os: macos-14
            target: darwin-arm64
            cibw_archs: "arm64"
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install LLVM 22.1 + toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-22 llvm-22-dev mlir-22 libmlir-22-dev

      - name: Install LLVM 22.1 + toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 cmake ninja eigen

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_BEFORE_BUILD_LINUX: "yum install -y llvm-toolset || true"
          CIBW_BEFORE_BUILD_MACOS: "brew install llvm@22 || true"
          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH=/opt/llvm/lib/cmake
            QSTACK_BUILD_PYTHON_WHEEL=ON
        with:
          package-dir: photon/bindings/python
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: photon-wheels-${{ matrix.target }}
          path: dist/*.whl

  build_spinor_submit_wheel:
    name: build heisenberg-spinor-submit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        working-directory: spinor/submit/python
        run: python -m build --sdist --wheel
      - name: Twine check
        run: twine check spinor/submit/python/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: spinor-submit-wheel
          path: spinor/submit/python/dist/*

  compiler_smoke:
    name: compiler-smoke (clean-room install)
    needs: [build_photon_wheels, build_spinor_submit_wheel]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten dist
        run: |
          mkdir -p dist-flat
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) \
              -exec cp {} dist-flat/ \;
          ls dist-flat
      - name: Clean-room install + smoke test
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist-flat/heisenberg_photon*.whl \
                                          dist-flat/heisenberg_spinor_submit*.whl \
              --extra-index-url https://download.pytorch.org/whl/cpu  # any other deps
          # Verify spinorc is on $PATH after the wheel install.
          /tmp/smoke-venv/bin/python -c "
          import shutil, photon, sys
          spinorc = shutil.which('spinorc') or str(__import__('pathlib').Path(photon.__file__).parent / 'bin' / 'spinorc')
          assert spinorc, 'spinorc not found after pip install heisenberg-photon'
          print('spinorc:', spinorc)
          "
          # Verify photon._engine compiles a trivial Phonon program.
          /tmp/smoke-venv/bin/python -c "
          import photon
          if not photon._ENGINE_AVAILABLE:
              raise SystemExit('photon._engine not loaded: ' + str(getattr(photon, '_IMPORT_ERROR', '?')))
          cp = photon.compile_phonon('target generic\nqubit q[1]\n', 'generic')
          assert cp.ok, cp.error
          print('photon._engine: OK')
          "
          # Verify the chip registry shipped with the wheel.
          /tmp/smoke-venv/bin/python -c "
          from pathlib import Path
          import photon
          reg = Path(photon.__file__).parent / 'registry' / 'chips'
          assert reg.is_dir(), f'registry not found at {reg}'
          chips = list(reg.glob('*.yaml'))
          assert len(chips) >= 20, f'expected >=20 chip YAMLs, found {len(chips)}'
          print(f'registry: {len(chips)} chips OK')
          "

  build_cpp_binaries:
    name: build CLI binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-14
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-22 llvm-22-dev mlir-22 libmlir-22-dev
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22 cmake ninja
      - name: Configure + build
        run: |
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
      - name: Stage signed-release binaries
        run: |
          mkdir -p stage
          for bin in spinorc phononc photonc photonc-cxx; do
            for f in build/spinor/cli/$bin build/phonon/cli/$bin \
                     build/photon/cli/$bin build/photon/frontends/cpp/$bin; do
              if [ -f "$f" ]; then cp "$f" stage/; fi
            done
          done
          ls stage
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Sign + SBOM each binary
        working-directory: stage
        run: |
          for bin in *; do
            COSIGN_EXPERIMENTAL=1 cosign sign-blob --yes --output-signature "$bin.sig" "$bin"
            syft "$bin" -o cyclonedx-json > "$bin.sbom.json"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: stage/*

  publish_github_release:
    name: attach assets to GitHub Release
    needs: [compiler_smoke, build_cpp_binaries]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten layout
        run: |
          mkdir -p release
          find artifacts -type f -print0 | xargs -0 -I{} cp {} release/
          ls release | head
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  publish_testpypi:
    name: publish to TestPyPI (dry-run)
    needs: compiler_smoke
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/heisenberg-photon
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Flatten dist
        run: |
          mkdir -p dist-flat
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist-flat/ \;
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-flat

  publish_pypi:
    name: publish to PyPI
    needs: publish_testpypi
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/heisenberg-photon
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Flatten dist
        run: |
          mkdir -p dist-flat
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist-flat/ \;
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-flat
