# CI: build the engine, jobsvc, calibration, and the playground; run
# all tests; smoke-test `heisenberg run` end-to-end.
#
# Pinned versions (re-verified upstream 2026-06-16):
#   - FastAPI               0.137.1
#   - PostgreSQL            17.10
#   - React                 19.2.7
#   - @monaco-editor/react  ^4.7.0
#   - nanobind              2.12.0
#   - LLVM/Clang/MLIR       22.1.8  (engine, when present)
#   - CPython               3.13 target / 3.12 floor
#   - Node                  22.x
#
# Author: Nimesh Cheedella.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jobsvc_unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install jobsvc + tests
        working-directory: quantum-stack/platform/jobsvc
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Unit tests (no Postgres)
        working-directory: quantum-stack/platform/jobsvc
        run: pytest tests/unit -ra --cov=jobsvc --cov-report=term-missing

  jobsvc_integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_USER: jobsvc
          POSTGRES_PASSWORD: jobsvc
          POSTGRES_DB: jobsvc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U jobsvc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        working-directory: quantum-stack/platform/jobsvc
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Alembic upgrade
        working-directory: quantum-stack/platform/jobsvc
        env:
          JOBSVC_DATABASE_URL: postgresql+asyncpg://jobsvc:jobsvc@localhost:5432/jobsvc
        run: alembic upgrade head
      - name: Integration tests
        working-directory: quantum-stack/platform/jobsvc
        env:
          JOBSVC_DATABASE_URL: postgresql+asyncpg://jobsvc:jobsvc@localhost:5432/jobsvc
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/quantum-stack/spinor/registry
          SPINOR_SUBMIT_MODE: cassette
        run: pytest tests/integration tests/regression -ra

  calibration_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        working-directory: quantum-stack/platform/calibration
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Tests
        working-directory: quantum-stack/platform/calibration
        run: pytest -ra

  playground_unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - name: Install
        working-directory: quantum-stack/platform/playground
        run: npm ci || npm install
      - name: Typecheck
        working-directory: quantum-stack/platform/playground
        run: npm run typecheck
      - name: Unit tests
        working-directory: quantum-stack/platform/playground
        run: npm test -- --coverage

  native_smoke:
    runs-on: ubuntu-24.04
    needs: [jobsvc_integration, playground_unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - name: Build playground SPA
        working-directory: quantum-stack/platform/playground
        run: |
          npm ci || npm install
          npm run build
      - name: Install heisenberg launcher + jobsvc
        working-directory: quantum-stack
        run: |
          python -m pip install --upgrade pip
          pip install -e ./platform/jobsvc -e ./platform/calibration -e ./platform/launcher
      - name: heisenberg init + seed
        env:
          HEISENBERG_DATA_DIR: ${{ runner.temp }}/heisenberg
        run: |
          heisenberg init
          heisenberg seed
      - name: Start heisenberg run in background and probe API
        env:
          HEISENBERG_DATA_DIR: ${{ runner.temp }}/heisenberg
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/quantum-stack/spinor/registry
          SPINOR_SUBMIT_MODE: cassette
        run: |
          heisenberg run --no-browser --background
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz && break || sleep 1
          done
          curl -fsS http://127.0.0.1:8080/api/v1/targets | head -c 200
          heisenberg stop || true
