# Build the documentation site and publish to GitHub Pages.
#
# This is the COMPILER repo's docs site. The PRODUCT-LAYER docs site
# lives at github.com/nimesh08/heisenberg-platform.
#
# Pinned versions (re-verified upstream 2026-06-16):
#   - mkdocs                  <2.0
#   - mkdocs-material         9.7.6
#   - mkdocstrings[python]    1.0.4
#   - mkdocstrings-python     2.0.4
#   - mkdocs-redirects        >=1.2,<2.0
#   - doxygen                 1.9.x  (apt-installed)
#   - actions/deploy-pages    @v4
#
# Author: Nimesh Cheedella.

name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Install Python packages (for mkdocstrings autodoc)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./spinor/submit/python
          # photon facade is in photon/frontends/python; install as
          # editable so mkdocstrings can see it. The C++ engine extension
          # is not built here (docs do not import _engine).
          pip install -e ./photon/frontends/python || true

      - name: Install docs build deps (pinned)
        run: |
          pip install \
            'mkdocs>=1.6,<2.0' \
            'mkdocs-material==9.7.6' \
            'mkdocstrings==1.0.4' \
            'mkdocstrings-python==2.0.4' \
            'pymdown-extensions>=10.7,<11' \
            'mkdocs-section-index>=0.3.9' \
            'mkdocs-glightbox>=0.4.0' \
            'mkdocs-redirects>=1.2,<2.0'

      - name: Build C++ reference (Doxygen)
        run: |
          mkdir -p docs/site/content/assets/cpp
          if [ -f docs/cpp/Doxyfile ]; then
            doxygen docs/cpp/Doxyfile
            cp -r docs/cpp/build/html/* docs/site/content/assets/cpp/
          else
            echo '<html><body><p>Doxygen output is generated on tagged releases; this preview build skipped it.</p></body></html>' \
              > docs/site/content/assets/cpp/index.html
          fi

      - name: Build site
        working-directory: docs/site
        run: mkdocs build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/build/site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
