# Phase B CI: build + run all tests on every push.
#
# Like Phase A's workflow, this does NOT install LLVM 22.1.7. The
# Phonon engine builds cleanly without it (the in-tree backend is
# always available; the MLIR bridge is gated by QSTACK_HAVE_LLVM).
#
# CI exercises the cassette-driven PyZX path (no Python or PyZX
# install required) and the NullSynthesizer path (no tweedledum
# install required) — Decision D12 in phaseB_decisions.md.

name: phase-b-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              cmake ninja-build g++-13 python3.12 python3-pip \
              gcovr

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Configure
        run: |
          cmake -S quantum-stack -B quantum-stack/build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build quantum-stack/build -j

      - name: Phase A regression
        working-directory: quantum-stack/build
        env:
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/quantum-stack/spinor/registry
        run: ctest --output-on-failure

      - name: Phase B tests
        working-directory: quantum-stack/build
        env:
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/quantum-stack/spinor/registry
          PHONON_CASSETTE_DIR: ${{ github.workspace }}/quantum-stack/phonon/optimizer/cassettes
        run: ctest -L "phonon_M[1-7]" --output-on-failure

  coverage_gate:
    runs-on: ubuntu-24.04
    needs: [build_and_test]
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 python3.12 \
                                    python3-pip gcovr
          python3 -m pip install pytest

      - name: Configure (coverage build)
        run: |
          cmake -S quantum-stack -B quantum-stack/build-cov \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_CXX_COMPILER=g++-13 \
                -DCMAKE_CXX_FLAGS="--coverage -O0 -g" \
                -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build quantum-stack/build-cov -j

      - name: Test
        working-directory: quantum-stack/build-cov
        env:
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/quantum-stack/spinor/registry
          PHONON_CASSETTE_DIR: ${{ github.workspace }}/quantum-stack/phonon/optimizer/cassettes
        run: ctest --output-on-failure

      - name: Coverage gate (≥85% line coverage on phonon/)
        run: |
          cd quantum-stack
          gcovr -r . \
                --filter 'phonon/(dialect|parser|types|lower|optimizer)/.*' \
                --fail-under-line 85.0 \
                --print-summary
