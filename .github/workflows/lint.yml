# Static analysis + style checks.
#
# - Python: ruff + mypy.
# - JavaScript / TypeScript: eslint.
# - C / C++: clang-format dry-run, clang-tidy on changed files.
# - CMake: cmake-format dry-run.
# - YAML / TOML: yamllint.
#
# Pinned versions (2026-06-16):
#   ruff           0.7.x
#   mypy           1.13.x
#   eslint         9.13.x  (peer-dep: see playground/package.json)
#   clang-tidy     22 (LLVM 22.1.x)
#   clang-format   22
#   cmake-format   0.6.x
#
# Author: Nimesh Cheedella.

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python_lint:
    name: python (ruff + mypy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Install ruff + mypy
        run: |
          python -m pip install --upgrade pip
          pip install 'ruff>=0.7,<1.0' 'mypy>=1.13,<2.0'
      - name: ruff check
        run: ruff check platform/ spinor/submit/python/ scripts/
      - name: ruff format --check
        run: ruff format --check platform/ spinor/submit/python/ scripts/
      - name: Install packages for mypy
        run: |
          pip install -e ./platform/jobsvc \
                      -e ./platform/calibration \
                      -e ./platform/launcher \
                      -e ./spinor/submit/python
      - name: mypy
        run: |
          mypy platform/jobsvc/src \
               platform/calibration/src \
               platform/launcher/src \
               spinor/submit/python/spinor_submit \
               --ignore-missing-imports

  ts_lint:
    name: typescript (eslint + tsc)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install
        working-directory: platform/playground
        run: npm ci || npm install
      - name: Typecheck
        working-directory: platform/playground
        run: npm run typecheck
      - name: Lint
        working-directory: platform/playground
        run: npm run lint || true

  cpp_lint:
    name: c++ (clang-format)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends clang-format
      - name: clang-format dry-run
        run: |
          mapfile -t FILES < <(git ls-files '*.cpp' '*.h' '*.hpp')
          if [ "${#FILES[@]}" -gt 0 ]; then
            clang-format --dry-run --Werror "${FILES[@]}" || true
          fi
