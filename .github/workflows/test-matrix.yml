# Multi-version test matrix.
#
# Python 3.12 + 3.13 against jobsvc, calibration, launcher,
# spinor-submit; Node 20 + 22 against the playground.
#
# Author: Nimesh Cheedella.

name: test-matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python_matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e ./platform/jobsvc[test] \
                      -e ./platform/calibration[test] \
                      -e ./platform/launcher \
                      -e ./spinor/submit/python
      - name: Run tests
        env:
          SPINOR_REGISTRY_ROOT: ${{ github.workspace }}/spinor/registry
          SPINOR_SUBMIT_MODE: cassette
        run: |
          pytest platform/jobsvc/tests/unit \
                 platform/calibration/tests \
                 spinor/submit/python/tests \
                 -ra

  node_matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}" }
      - name: Install
        working-directory: platform/playground
        run: npm ci || npm install
      - name: Typecheck
        working-directory: platform/playground
        run: npm run typecheck
      - name: Test
        working-directory: platform/playground
        run: npm test -- --coverage
