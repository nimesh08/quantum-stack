# Dependency update bot for the Heisenberg Quantum Stack.
#
# Scans:
# - All Python pyproject.toml files (jobsvc, calibration, launcher,
#   spinor-submit, photon, docs site).
# - The playground's package.json.
# - GitHub Actions workflows.
#
# Author: Nimesh Cheedella.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/platform/jobsvc"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]

  - package-ecosystem: "pip"
    directory: "/platform/calibration"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]

  - package-ecosystem: "pip"
    directory: "/platform/launcher"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]

  - package-ecosystem: "pip"
    directory: "/spinor/submit/python"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]

  - package-ecosystem: "pip"
    directory: "/docs/site"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docs"]

  - package-ecosystem: "npm"
    directory: "/platform/playground"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "javascript"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
